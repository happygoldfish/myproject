$kind: collection
name: 'API-Test'
variables:
  - key: baseUrl
    value: 'http://127.0.0.1:8000'
  - key: postId
    value: '1'
  - key: userId
    value: '1'
  - key: newUser
    value: "newUser" 
  - key: newUserName
    value: "new"
  - key: newUserLName
    value: "UserName"
  - key: newUserPass
    value: "newUserPass"

# Explicit execution steps defined sequentially from top to bottom
steps:
  - name: "Create New User"
    path: "01-users/01-01-create-user.request.yaml"
  - name: "Get User By ID"
    path: "01-users/01-02-get-user-by-id.request.yaml"
  - name: "Get User list"
    path: "01-users/01-03-list-users.request.yaml"
  - name: "Get Users"
    path: "01-users/01-04-get-users.request.yaml"
  - name: "Update User By ID"
    path: "01-users/01-05-update-user-by-id.request.yaml"
  - name: "Create Post"
    path: "02-posts/02-01-create-post.request.yaml"
  - name: "Get Post By ID"
    path: "02-posts/02-02-get-post-by-id.request.yaml"
  - name: "Update Post By ID"
    path: "02-posts/02-04-update-post-by-id.request.yaml"
  - name: "Remove Post By ID"
    path: "03-cleanup/03-01-delete-post-by-id.request.yaml"
  - name: "Remove User By ID"
    path: "03-cleanup/03-02-delete-user-by-id.request.yaml"