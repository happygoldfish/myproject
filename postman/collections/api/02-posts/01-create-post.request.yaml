$kind: http-request
url: "{{baseUrl}}/react/posts/"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "New Post Title",
      "body": "NewPostBody",
      "slug": "New-Post-Title",
      "author": "{{updatedUser}}"
    }
    
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200 or 201', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });

      const data = pm.response.json();

      pm.test('Response is an object or array', function () {
        pm.expect(data).to.satisfy(function (value) {
          return value !== null && (Array.isArray(value) || typeof value === 'object');
        });
      });

      if (data && data.id) {
        pm.collectionVariables.set('postId', String(data.id));
      }
    language: text/javascript
order: 1000
