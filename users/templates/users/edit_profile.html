{% extends 'layout.html' %}

{% block title %}
    Edit Profile
{% endblock %}

{% block content %}
    <h1>Edit Profile</h1>
    <form class="form-with-validation" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <h3>Användarinformation</h3>
        {{ user_form.as_p }}
    
        <h3>Profilinformation</h3>
        {{ profile_form.as_p }}
        <button class="form-submit">Update {{user.username}}'s Profile</button>
        
    </form>
{% endblock %}
