name: Quality Assurance
on:
  push:
    branches: ["main", "TestForCI"]
  pull_request:
    branches: ["main", "TestForCI"]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.14'

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'

            - name: Install Python dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v

            - name: Install npm & Playwright
              run: |
                npm ci && npx playwright install

            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py runserver 0.0.0.0:8000 &
                DJANGO_PID=$!
                
                sleep 5
                
                npm test
                
                TEST_EXIT_CODE=$?
                kill $DJANGO_PID
                exit $TEST_EXIT_CODE
