name: Quality Assurance
on: [pull_request, workflow_call]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest

        steps:
            # 1. Hämta koden från ditt GitHub-repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Sätt upp Python 3.14 på Ubuntu-maskinen
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.14'

            # 3. Sätt upp Node.js 24 på Ubuntu-maskinen
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'

            # 4. Installera Python-beroenden
            - name: Install Python dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # 5. Kör Django-migrationerna för att skapa SQLite-databasen
            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            # 6. Kör dina Python-kvalitetstester
            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v

            # 7. Installera npm-paket och Playwright-webbläsare
            - name: Install npm & Playwright
              run: |
                # --unsafe-perm tvingar npm att sätta korrekta rättigheter på binärer under installationen
                npm install --include=dev --unsafe-perm
                npx playwright install chromium --with-deps

            # 8. Starta backend och kör dina frontend BDD-tester
            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
                PATH: ${{ github.workspace }}/node_modules/.bin:${{ env.PATH }}
              run: |
                # Fixa rättigheter på ALLA dolda filer inuti Playwright- och BDD-paketen
                chmod -R +x ./node_modules/.bin/
                find ./node_modules/playwright -type f -name "*.sh" -exec chmod +x {} +
                find ./node_modules/playwright-bdd -type f -exec chmod +x {} +
                
                # Starta Django i bakgrunden
                python manage.py runserver 0.0.0.0:8000 &
                DJANGO_PID=$!
                
                # Vänta 5 sekunder tills servern är redo att ta emot anrop
                sleep 5
                
                # Kör dina BDD-tester
                npm test
                
                # Spara resultat och stäng ner processen rent
                TEST_EXIT_CODE=$?
                kill $DJANGO_PID
                exit $TEST_EXIT_CODE
