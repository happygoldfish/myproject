name: Quality Assurance
on: [pull_request, workflow_call]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest
        container: nikolaik/python-nodejs:python3.14-nodejs24

        steps:
            # 1. Hämta koden från ditt GitHub-repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Installera beroenden 
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # 3. Kör Django-migrationerna för att skapa SQLite-databasen
            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            # 4. Kör dina kvalitetstester
            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v

            # 5. Kör dina frontend- och BDD-tester
            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
                # Lägg till hemkatalogen för node i projektmappen så Playwright har full skrivrättighet
                PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
              run: |
                # 1. Installera grundpaketen
                npm install --include=dev
                
                # 2. Tvinga installation av Playwright-kärnan så att filerna hittas på rätt sökväg
                npm install --no-save @playwright/test playwright
                
                # 3. Sätt rättigheter direkt på binärerna
                chmod -R +x ./node_modules/.bin/
                
                # 4. Installera webbläsarna via den lokala binären
                ./node_modules/.bin/playwright install chromium
                chmod -R +x $PLAYWRIGHT_BROWSERS_PATH
                
                # 5. Starta Django i bakgrunden
                python manage.py runserver 0.0.0.0:8000 &
                DJANGO_PID=$!
                
                # 6. Vänta tills servern svarar
                sleep 5
                
                # 7. Kör dina BDD-tester
                npm test
                
                # 8. Spara resultat och rensa processen
                TEST_EXIT_CODE=$?
                kill $DJANGO_PID
                exit $TEST_EXIT_CODE
