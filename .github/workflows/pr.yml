name: Quality Assurance
on: [pull_request, workflow_call]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest
        container: nikolaik/python-nodejs:python3.14-nodejs24

        steps:
            # 1. Hämta koden från ditt GitHub-repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Installera beroenden 
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # 3. Kör Django-migrationerna för att skapa SQLite-databasen
            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            # 4. Kör dina kvalitetstester
            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v

            # 5. Kör dina frontend- och BDD-tester
            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
                # Lägg till hemkatalogen för node i projektmappen så Playwright har full skrivrättighet
                PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
              run: |
                # Installera paket och tvinga lokala binärer
                npm install --include=dev
                
                # Sätt rättigheter på lokala node_modules direkt efter installation
                chmod -R +x ./node_modules/.bin/
                
                # Installera Playwrights webbläsare direkt i din godkända arbetsmapp
                npx playwright install chromium --with-deps
                chmod -R +x $PLAYWRIGHT_BROWSERS_PATH
                
                # Starta Django i bakgrunden
                python manage.py runserver 0.0.0.0:8000 &
                DJANGO_PID=$!
                
                # Vänta tills servern svarar
                sleep 5
                
                # Kör testerna via npx så att Playwright-binären ärver rätt miljö
                npx npm test
                
                # Spara resultat och rensa processen
                TEST_EXIT_CODE=$?
                kill $DJANGO_PID
                exit $TEST_EXIT_CODE
