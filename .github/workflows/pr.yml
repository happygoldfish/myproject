name: Quality Assurance
on: [pull_request, workflow_call]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest
        container: nikolaik/python-nodejs:python3.14-nodejs24

        steps:
            # 1. Hämta koden från ditt GitHub-repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Installera beroenden 
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # 3. Kör Django-migrationerna för att skapa SQLite-databasen
            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            # 4. Kör dina kvalitetstester
            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v
                
            - name: Install dependencies & Run server
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                npm install
                python manage.py runserver 0.0.0.0:8000 &
                DJANGO_PID=$!
                sleep 10  
                chmod -R +x node_modules/.bin

            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                npm test
                TEST_EXIT_CODE=$?

# Stäng av Django-servern och avsluta skriptet med testernas status
kill $DJANGO_PID
exit $TEST_EXIT_CODE