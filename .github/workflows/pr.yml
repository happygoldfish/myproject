name: Quality Assurance
on: [pull_request, workflow_call]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest
        container: nikolaik/python-nodejs:python3.14-nodejs24

        steps:
            # 1. Hämta koden från ditt GitHub-repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Installera Python-beroenden 
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # 3. Kör Django-migrationerna för att skapa SQLite-databasen
            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            # 4. Kör dina kvalitetstester
            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v

            # 5. Installera npm-paket
            - name: Install npm packages
              run: |
                npm install --include=dev

            # 6. Installera Playwright via GitHubs officiella Action (Fixar felen)
            - name: Install Playwright Browsers
              uses: microsoft/playwright@v1

            # 7. Starta backend och kör testerna
            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                # Sätt rättigheter på lokala node_modules direkt
                chmod -R +x ./node_modules/.bin/
                
                # Starta Django i bakgrunden
                python manage.py runserver 0.0.0.0:8000 &
                DJANGO_PID=$!
                
                # Vänta tills servern svarar
                sleep 5
                
                # Kör testerna
                npm test
                
                # Spara resultat och rensa processen
                TEST_EXIT_CODE=$?
                kill $DJANGO_PID
                exit $TEST_EXIT_CODE
