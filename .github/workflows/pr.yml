name: Quality Assurance
on: [pull_request, workflow_call]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest
        container: nikolaik/python-nodejs:python3.14-nodejs24

        steps:
            # 1. Hämta koden från ditt GitHub-repository
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Installera beroenden 
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # 3. Kör Django-migrationerna för att skapa SQLite-databasen
            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            # 4. Kör dina kvalitetstester
            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v
            - name: Install Node inside container
              run: |
                curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
                apt-get update && apt-get install -y nodejs build-essential   
            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                npm install
                sleep 10
                py .\manage.py runserver 127.0.0.1:8000 &
                DJANGO_PID=$!
                sleep 5
                npm test
                TEST_EXIT_CODE=$?
                kill $DJANGO_PID
                exit $TEST_EXIT_CODE
