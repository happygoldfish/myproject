name: Quality Assurance
on: [pull_request, workflow_call]

jobs:
    quality-assurance:
        name: Quality Assurance
        runs-on: ubuntu-latest
        

        steps:
            # Hämta koden från GitHub
            - name: Checkout code
              uses: actions/checkout@v4

            # Sätt upp Python 3.14 på en Ubuntu-maskin
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.14'

            # Sätt upp Node.js 24 på samma Ubuntu-maskin
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'

            # Installera Python-beroenden
            - name: Install Python dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # Kör Django-migrationerna för att skapa SQLite-databasen
            - name: Run Database Migrations
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                python manage.py migrate

            # Kör Python-kvalitetstester
            - name: Run pyTest
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                pytest -v

            # Installera npm-paket och Playwright-webbläsare
            - name: Install npm & Playwright
              run: |
                npm install --include=dev
                # Detta installerar Chromium och alla Linux-bibliotek som behövs
                chmod -R +x node_modules/.bin/
                # npx playwright install chromium --with-deps
                ./node_modules/.bin/playwright install chromium --with-deps

            # Starta backend och kör dina frontend BDD-tester
            - name: Run npm test
              env:
                PYTHONDONOTWRITEBYTECODE: 1
                PYTHONUNBUFFERED: 1
              run: |
                # Starta applikationen i bakgrunden
                # python manage.py runserver 0.0.0.0:8000 &
                # Vänta 5 sekunder tills servern är redo att ta emot anrop
                sleep 5
                # Kör tester
                npm test
